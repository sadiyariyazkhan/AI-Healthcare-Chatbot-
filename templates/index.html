<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Healthcare Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ---------- GLOBAL STYLES ---------- */
        body {
            font-family: 'Roboto', sans-serif;
            background: #eef1f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            padding: 40px 0;
        }

        .chat-container {
            width: 600px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            height: 650px;
            overflow: hidden;
        }

        /* ---------- HEADER ---------- */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: #8c00ff;
            color: #fff;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        .header img {
            height: 45px;
            width: 45px;
            border-radius: 50%;
        }

        .header h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        /* ---------- CHAT BOX ---------- */
        #chatbox {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 80%;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-message {
            background: #00b7ff;
            color: #fff;
            align-self: flex-end;
        }

        .bot-message {
            background: #f1f0f0;
            color: #333;
            align-self: flex-start;
        }

        /* ---------- INPUT AREA ---------- */
        .input-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f7f7f7;
            padding: 10px 15px;
            border-top: 1px solid #ddd;
        }

        #userinput {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 1rem;
            transition: 0.2s ease;
        }

        #userinput:focus {
            border-color: #8c00ff;
            box-shadow: 0 0 5px rgba(140, 0, 255, 0.3);
        }

        .send-btn, .mic-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s ease;
        }

        .send-btn {
            background: #8c00ff;
        }

        .send-btn:hover {
            transform: scale(1.1);
            background: #9e00b3;
        }

        .mic-btn {
            background: #00b7ff;
        }

        .mic-btn.recording {
            background: #ff3b3b;
            animation: pulse 1s infinite;
        }

        .mic-btn:hover {
            transform: scale(1.1);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        /* ---------- SCROLLBAR ---------- */
        #chatbox::-webkit-scrollbar {
            width: 8px;
        }

        #chatbox::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <img src="/static/medical_logo.jpg" alt="Medical Logo">
            <h2>Hello! I am AI Healthcare Chatbot</h2>
        </div>

        <div id="chatbox"></div>

        <div class="input-container">
            <button id="mic-btn" class="mic-btn" title="Speak"><span>🎤</span></button>
            <input type="text" id="userinput" placeholder="Type your message or use mic..." />
            <button class="send-btn" onclick="sendMessage()">&#9658;</button>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let recognition;
        let isRecording = false;

        // 🎤 Speech-to-Text Setup
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.trim();
                document.getElementById('userinput').value = transcript;
                sendMessage(); // auto-send message after speech input
            };

            recognition.onerror = function() {
                toggleMic(false);
            };

            recognition.onend = function() {
                toggleMic(false);
            };
        } else {
            alert("Speech recognition not supported in this browser. Please use Chrome.");
        }

        document.getElementById("mic-btn").addEventListener("click", function() {
            if (!recognition) return;
            if (isRecording) {
                recognition.stop();
                toggleMic(false);
            } else {
                recognition.start();
                toggleMic(true);
            }
        });

        function toggleMic(active) {
            const micBtn = document.getElementById('mic-btn');
            isRecording = active;
            if (active) {
                micBtn.classList.add('recording');
            } else {
                micBtn.classList.remove('recording');
            }
        }

        // 💬 Send message to backend
        async function sendMessage() {
            const input = document.getElementById('userinput');
            const message = input.value.trim();
            if (!message) return;

            const chatbox = document.getElementById('chatbox');

            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.textContent = `You: ${message}`;
            chatbox.appendChild(userDiv);

            input.value = '';
            chatbox.scrollTop = chatbox.scrollHeight;

            chatHistory.push({role: 'user', content: message});

            const botDiv = document.createElement('div');
            botDiv.className = 'message bot-message';
            botDiv.innerHTML = 'Assistant: <span class="typing"></span>';
            chatbox.appendChild(botDiv);
            chatbox.scrollTop = chatbox.scrollHeight;

            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({messages: chatHistory})
            });

            const data = await response.json();
            const text = data.reply;
            chatHistory.push({role: 'assistant', content: text});

            const formattedText = text
                .replace(/\n{2,}/g, "</p><p>")
                .replace(/\n/g, "<br>");
            const finalHTML = `<p>${formattedText}</p>`;

            let i = 0;
            const typingSpan = botDiv.querySelector('.typing');
            function typeWriter() {
                if (i <= finalHTML.length) {
                    typingSpan.innerHTML = finalHTML.slice(0, i);
                    i++;
                    chatbox.scrollTop = chatbox.scrollHeight;
                    setTimeout(typeWriter, 10);
                }
            }
            typeWriter();
        }

        document.getElementById("userinput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
